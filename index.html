<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة نشر الأبحاث العلمية</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="hero-copy">
                <h1>منصة نشر الأبحاث العلمية</h1>
                <p>أنشر بحثك باسمك واسم مهنتك، واطلع على كل الأبحاث المنشورة من الزملاء.</p>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="grid-two-columns">
            <article class="card">
                <h2>أضِف بحث جديد</h2>
                <form id="researchForm">
                    <div class="form-row">
                        <label for="name">الاسم الكامل</label>
                        <input type="text" id="name" name="name" required placeholder="اكتب اسمك هنا" />
                    </div>

                    <div class="form-row">
                        <label for="role">المهنة</label>
                        <select id="role" name="role" required>
                            <option value="">اختر</option>
                            <option value="محامٍ">محامٍ</option>
                            <option value="دكتور جامعة">دكتور جامعة</option>
                            <option value="باحث">باحث</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label for="title">عنوان البحث</label>
                        <input type="text" id="title" name="title" required placeholder="عنوان البحث" />
                    </div>

                    <div class="form-row">
                        <label for="abstract">ملخص البحث</label>
                        <textarea id="abstract" name="abstract" rows="5" placeholder="اكتب وصفاً موجزاً للبحث"></textarea>
                    </div>

                    <div class="form-row">
                        <label for="file">تحميل ملف البحث (PDF أو Word)</label>
                        <input type="file" id="file" name="file" accept=".pdf,.doc,.docx" />
                    </div>

                    <button type="submit" class="button">نشر البحث</button>
                </form>
            </article>

            <article class="card">
                <div class="entries-header">
                    <h2>الأبحاث المنشورة</h2>
                    <p id="summaryText">جميع الأبحاث محفوظة على الخادم ويمكن الوصول إليها من أي متصفح.</p>
                </div>

                <div class="filters">
                    <input id="searchInput" type="search" placeholder="ابحث بالاسم أو عنوان البحث" />
                    <select id="roleFilter">
                        <option value="">كل المهن</option>
                        <option value="محامٍ">محامٍ</option>
                        <option value="دكتور جامعة">دكتور جامعة</option>
                        <option value="باحث">باحث</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div class="stats-row">
                    <span id="researchCount">عدد الأبحاث: 0</span>
                    <button id="clearFilters" type="button" class="button button-secondary">إعادة تعيين</button>
                </div>

                <div id="entries" class="entries">
                    <p class="empty">لا يوجد أبحاث حتى الآن. كن أول من ينشر.</p>
                </div>
            </article>
        </section>
    </main>

    <footer class="footer">
        <p>.نسخة تجربية</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
